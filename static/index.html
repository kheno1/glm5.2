<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #16162a;
      border-left: 1px solid #2a2a45;
      border-right: 1px solid #2a2a45;
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      background: #1e1e35;
      border-bottom: 1px solid #2a2a45;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h2 {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }

    .header-info span {
      font-size: 12px;
      color: #7c7caa;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-actions {
      margin-left: auto;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid #3a3a5c;
      color: #9999cc;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn-reset:hover {
      background: #2a2a45;
      color: #ffffff;
      border-color: #6c63ff;
    }

    /* Messages Area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 5px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #3a3a5c;
      border-radius: 10px;
    }

    /* Message Bubbles */
    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.bot .msg-avatar {
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
    }

    .message.user .msg-avatar {
      background: linear-gradient(135deg, #f97316, #fb923c);
    }

    .msg-bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .message.bot .msg-bubble {
      background: #1e1e35;
      border: 1px solid #2a2a45;
      border-bottom-left-radius: 4px;
      color: #d4d4f0;
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      border-bottom-right-radius: 4px;
      color: #ffffff;
    }

    .msg-time {
      font-size: 11px;
      color: #555577;
      margin-top: 4px;
      padding: 0 4px;
    }

    .message.user .msg-time {
      text-align: right;
    }

    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .typing-dots {
      background: #1e1e35;
      border: 1px solid #2a2a45;
      border-bottom-left-radius: 4px;
      border-radius: 18px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: #6c63ff;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* Welcome Message */
    .welcome-msg {
      text-align: center;
      padding: 40px 20px;
      color: #555577;
    }

    .welcome-msg .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .welcome-msg h3 {
      font-size: 20px;
      color: #9999cc;
      margin-bottom: 8px;
    }

    .welcome-msg p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* Input Area */
    .chat-input-area {
      padding: 16px 20px;
      background: #1e1e35;
      border-top: 1px solid #2a2a45;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #0f0f1a;
      border: 1px solid #3a3a5c;
      border-radius: 16px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 14.5px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
    }

    #userInput::placeholder {
      color: #44445a;
    }

    .btn-send {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .btn-send:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
    }

    .btn-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-send svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .input-footer {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: #33334a;
    }

    /* Error bubble */
    .msg-bubble.error {
      background: #2a1a1a;
      border-color: #5a2a2a;
      color: #ff7777;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .msg-bubble {
        max-width: 88%;
      }

      .chat-header {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-avatar">✦</div>
    <div class="header-info">
      <h2>AI Assistant</h2>
      <span><span class="status-dot"></span>Online</span>
    </div>
    <div class="header-actions">
      <button class="btn-reset" onclick="resetChat()">Reset Chat</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages">
    <div class="welcome-msg" id="welcomeMsg">
      <div class="icon">✦</div>
      <h3>Halo! Ada yang bisa saya bantu?</h3>
      <p>Tanyakan apa saja, saya siap membantu kamu.</p>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chat-input-area">
    <div class="input-box">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Ketik pesan kamu di sini..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">Tekan Enter untuk kirim, Shift+Enter untuk baris baru</div>
  </div>

</div>

<script>
  const SESSION_ID = "user_" + Math.random().toString(36).substr(2, 9);
  let isLoading = false;

  function getTime() {
    const now = new Date();
    return now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollToBottom() {
    const container = document.getElementById('chatMessages');
    container.scrollTop = container.scrollHeight;
  }

  function removeWelcome() {
    const welcome = document.getElementById('welcomeMsg');
    if (welcome) welcome.remove();
  }

  function appendMessage(role, text, isError = false) {
    removeWelcome();
    const container = document.getElementById('chatMessages');

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'bot' ? '✦' : '👤';

    const inner = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (isError ? ' error' : '');
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    inner.appendChild(bubble);
    inner.appendChild(time);

    wrapper.appendChild(avatar);
    wrapper.appendChild(inner);

    container.appendChild(wrapper);
    scrollToBottom();
  }

  function showTyping() {
    removeWelcome();
    const container = document.getElementById('chatMessages');

    const wrapper = document.createElement('div');
    wrapper.className = 'typing-indicator';
    wrapper.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.style.background = 'linear-gradient(135deg, #6c63ff, #a78bfa)';
    avatar.textContent = '✦';

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(dots);
    container.appendChild(wrapper);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    if (isLoading) return;

    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pesan: text, session_id: SESSION_ID })
      });

      const data = await res.json();
      hideTyping();

      if (data.jawaban) {
        const isError = data.jawaban.startsWith('DEBUG') ||
                        data.jawaban.startsWith('Error') ||
                        data.jawaban.includes('timeout');
        appendMessage('bot', data.jawaban, isError);
      }

    } catch (err) {
      hideTyping();
      appendMessage('bot', 'Gagal terhubung ke server. Coba lagi ya.', true);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }

  async function resetChat() {
    try {
      await fetch('/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID })
      });
    } catch (e) {}

    const container = document.getElementById('chatMessages');
    container.innerHTML = `
      <div class="welcome-msg" id="welcomeMsg">
        <div class="icon">✦</div>
        <h3>Halo! Ada yang bisa saya bantu?</h3>
        <p>Tanyakan apa saja, saya siap membantu kamu.</p>
      </div>
    `;
  }
</script>

</body>
</html>
