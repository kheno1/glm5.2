<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 650px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #4f46e5;
            color: white;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header div h2 {
            font-size: 20px;
        }

        .header div p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .btn-reset {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-reset:hover {
            background: rgba(255,255,255,0.3);
        }

        .chat-box {
            height: 420px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .bubble.user {
            background: #4f46e5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bubble.bot {
            background: #f0f2f5;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .bubble.loading {
            background: #f0f2f5;
            color: #999;
            align-self: flex-start;
            font-style: italic;
        }

        .bubble.info {
            background: #fef3c7;
            color: #92400e;
            align-self: center;
            font-size: 12px;
            text-align: center;
            border-radius: 8px;
        }

        .input-area {
            display: flex;
            padding: 16px;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #4f46e5;
        }

        .input-area button {
            padding: 12px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .input-area button:hover {
            background: #4338ca;
        }

        .input-area button:disabled {
            background: #a5b4fc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>GLM Chat</h2>
                <p>Powered by Zhipu AI</p>
            </div>
            <button class="btn-reset" onclick="resetChat()">Reset Chat</button>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="bubble bot">Halo! Ada yang bisa saya bantu?</div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="inputPesan"
                placeholder="Ketik pesan kamu..."
                onkeydown="if(event.key === 'Enter') kirim()"
            />
            <button id="tombolKirim" onclick="kirim()">Kirim</button>
        </div>
    </div>

    <script>
        async function kirim() {
            const input = document.getElementById("inputPesan");
            const chatBox = document.getElementById("chatBox");
            const tombol = document.getElementById("tombolKirim");
            const pesan = input.value.trim();

            if (!pesan) return;

            // Tampilkan pesan user
            const bubbleUser = document.createElement("div");
            bubbleUser.className = "bubble user";
            bubbleUser.innerText = pesan;
            chatBox.appendChild(bubbleUser);

            // Tampilkan loading
            const bubbleLoading = document.createElement("div");
            bubbleLoading.className = "bubble loading";
            bubbleLoading.innerText = "GLM sedang mengetik...";
            chatBox.appendChild(bubbleLoading);

            input.value = "";
            tombol.disabled = true;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pesan: pesan })
                });

                const data = await res.json();

                chatBox.removeChild(bubbleLoading);
                const bubbleBot = document.createElement("div");
                bubbleBot.className = "bubble bot";
                bubbleBot.innerText = data.jawaban;
                chatBox.appendChild(bubbleBot);

            } catch (error) {
                chatBox.removeChild(bubbleLoading);
                const bubbleError = document.createElement("div");
                bubbleError.className = "bubble bot";
                bubbleError.innerText = "Terjadi kesalahan, coba lagi.";
                chatBox.appendChild(bubbleError);
            }

            tombol.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function resetChat() {
            const chatBox = document.getElementById("chatBox");

            await fetch("/reset", { method: "POST" });

            chatBox.innerHTML = "";

            const info = document.createElement("div");
            info.className = "bubble info";
            info.innerText = "Chat telah direset";
            chatBox.appendChild(info);

            const bubbleBot = document.createElement("div");
            bubbleBot.className = "bubble bot";
            bubbleBot.innerText = "Halo! Ada yang bisa saya bantu?";
            chatBox.appendChild(bubbleBot);
        }
    </script>
</body>
</html>
